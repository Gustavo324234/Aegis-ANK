name: SRE Release - Automated Versioning

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Google Release Please (The SRE Bot)
    runs-on: ubuntu-latest
    steps:
      - name: Release Please Action
        uses: google-github-actions/release-please-action@v4
        with:
          # Usamos un archivo de configuración para soportar el workspace de Cargo
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
